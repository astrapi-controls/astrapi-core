<!DOCTYPE html>
<html lang="{{ app_lang | default('de') }}" class="{{ 'light-mode' if light_mode else '' }}" data-icon-theme="{{ icon_theme }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="{{ app_icon_svg | default('data:image/svg+xml,<svg xmlns=\'http://www.w3.org/2000/svg\' viewBox=\'0 0 24 24\' fill=\'none\' stroke=\'%23a3a3a3\' stroke-width=\'1.8\'><circle cx=\'12\' cy=\'12\' r=\'10\'/><polyline points=\'9 12 11 14 15 10\'/></svg>') }}">
  <title>{% block title %}{{ app_name }}{% endblock %}</title>
  <link rel="manifest" href="/static/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#242424">
  <link rel="apple-touch-icon" href="/static/icons/icon-192.png">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <!-- Core styles (nicht überschreiben – per Update austauschbar) -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">

  <!-- App-eigene Erweiterungen -->
  {% block extra_css %}{% endblock %}
</head>
<body>

{% include "partials/components/sprites/" ~ icon_theme ~ ".svg" %}

{% block content %}{% endblock %}

<div id="modal-container"></div>

<!-- Core scripts (nicht überschreiben – per Update austauschbar) -->
<script src="https://unpkg.com/htmx.org@1.9.10/dist/htmx.min.js"></script>
<script defer src="https://unpkg.com/alpinejs@3.15.8/dist/cdn.min.js"></script>
<script src="{{ url_for('static', filename='js/app.js') }}"></script>
<script src="{{ url_for('static', filename='js/components/navigation.js') }}"></script>

{% block extra_js %}{% endblock %}
</body>
</html>
