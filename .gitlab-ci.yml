# ──────────────────────────────────────────────────────────────────────────────
# AstrapiFlaskUi – GitLab CI/CD
#
# Stages:
#   test    → Lint + Smoke-Test (jeder Push)
#   release → ZIP bauen + GitLab Release erstellen (nur bei v*-Tags)
# ──────────────────────────────────────────────────────────────────────────────

stages:
  - test
  - release

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

cache:
  paths:
    - .cache/pip

# ── Lint ──────────────────────────────────────────────────────────────────────
lint:
  stage: test
  image: python:3.11-slim
  script:
    - pip install ruff --quiet
    - ruff check core/
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

# ── Smoke-Test ────────────────────────────────────────────────────────────────
smoke-test:
  stage: test
  image: python:3.11-slim
  script:
    - pip install -r requirements.txt --quiet
    - python -c "from core.ui import create; print('Import OK')"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'

# ── Release-ZIP bauen + veröffentlichen ───────────────────────────────────────
release:
  stage: release
  image: python:3.11-slim
  script:
    - apt-get update -qq && apt-get install -y zip curl --quiet
    - |
      VERSION="${CI_COMMIT_TAG}"
      ZIP_NAME="AstrapiFlaskUi-${VERSION}.zip"

      echo "Building release ZIP: ${ZIP_NAME}"

      # Temporäres Staging-Verzeichnis
      mkdir -p staging/AstrapiFlaskUi-core/core

      # Nur core/ ins ZIP – das ist alles was für ein Update nötig ist
      cp -r core/static  staging/AstrapiFlaskUi-core/core/
      cp -r core/templates staging/AstrapiFlaskUi-core/core/
      cp -r core/ui      staging/AstrapiFlaskUi-core/core/

      # INSTALL.md ins ZIP legen
      cp INSTALL.md staging/AstrapiFlaskUi-core/

      # ZIP erzeugen
      cd staging
      zip -r "../${ZIP_NAME}" AstrapiFlaskUi-core/
      cd ..

      echo "ZIP contents:"
      unzip -l "${ZIP_NAME}"

    - |
      # GitLab Release erstellen + ZIP als Asset anhängen
      VERSION="${CI_COMMIT_TAG}"
      ZIP_NAME="AstrapiFlaskUi-${VERSION}.zip"

      # 1. ZIP als Package-Generic hochladen
      curl --fail --silent \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --upload-file "${ZIP_NAME}" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/AstrapiFlaskUi/${VERSION}/${ZIP_NAME}"

      ASSET_URL="${CI_SERVER_URL}/${CI_PROJECT_PATH}/-/packages/generic/AstrapiFlaskUi/${VERSION}/${ZIP_NAME}"
      echo "Asset URL: ${ASSET_URL}"

      # 2. GitLab Release mit Link auf das ZIP anlegen
      curl --fail --silent \
        --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
        --header "Content-Type: application/json" \
        --data "{
          \"name\": \"AstrapiFlaskUi ${VERSION}\",
          \"tag_name\": \"${VERSION}\",
          \"description\": \"## AstrapiFlaskUi ${VERSION}\n\nRelease des Framework-Kerns. Zum Update einfach \`core/\` aus dem ZIP ins Projekt kopieren.\n\nSiehe [INSTALL.md](INSTALL.md) für Details.\",
          \"assets\": {
            \"links\": [{
              \"name\": \"${ZIP_NAME}\",
              \"url\": \"${ASSET_URL}\",
              \"link_type\": \"package\"
            }]
          }
        }" \
        "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/releases"

  artifacts:
    paths:
      - "AstrapiFlaskUi-*.zip"
    expire_in: 30 days

  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+$/'
