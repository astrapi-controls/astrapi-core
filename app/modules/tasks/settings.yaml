# app/modules/tasks/settings.yaml
# Modulbezogene Einstellungen für das Tasks-Modul

- key: default_schedule
  label: Standard-Schedule
  type: text
  default: "0 2 * * *"
  placeholder: "0 2 * * *"
  description: Cron-Ausdruck für neue Tasks

- key: max_retries
  label: Max. Wiederholungen
  type: number
  default: "3"
  description: Anzahl Wiederholungsversuche bei Fehler

- key: timeout
  label: Timeout (s)
  type: number
  default: "300"
  description: Maximale Laufzeit eines Tasks in Sekunden
