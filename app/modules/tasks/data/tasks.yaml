# app/modules/tasks/data/tasks.yaml
backup-daily:
  description: Tägliches Backup
  command: /usr/local/bin/backup.sh
  schedule: "0 2 * * *"
  enabled: true

cleanup-logs:
  description: Log-Bereinigung
  command: find /var/log -name "*.log" -mtime +30 -delete
  schedule: "0 3 * * 0"
  enabled: true

health-check:
  description: Health-Check
  command: curl -sf http://localhost/api/health
  schedule: "*/5 * * * *"
  enabled: false
