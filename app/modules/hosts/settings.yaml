# app/modules/hosts/settings.yaml
# Modulbezogene Einstellungen für das Hosts-Modul

- key: default_port
  label: Standard-Port
  type: number
  default: "22"
  description: SSH-Port für neue Hosts

- key: default_user
  label: Standard-Benutzer
  type: text
  default: root
  placeholder: root
  description: SSH-Benutzer für neue Hosts

- key: connect_timeout
  label: Verbindungs-Timeout (s)
  type: number
  default: "10"
  description: Timeout in Sekunden für SSH-Verbindungsversuche
