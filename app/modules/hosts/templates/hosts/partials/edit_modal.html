<div class="ds-modal-backdrop"
     x-data x-on:keydown.escape.window="$el.remove()" x-on:click.self="$el.remove()">
  <div class="ds-modal">
    <div class="ds-modal-title">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
        <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
      </svg>
      Host bearbeiten – {{ host_id }}
    </div>
    <form hx-put="/api/hosts/{{ host_id }}/edit"
          hx-target="#{{ container_id }}"
          hx-swap="innerHTML"
          hx-on::after-request="this.closest('.ds-modal-backdrop').remove()"
          style="display:flex; flex-direction:column; gap:14px;">

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
        <div class="form-group">
          <label class="form-label">Beschreibung</label>
          <input class="form-input" type="text" name="description" value="{{ host.description or '' }}">
        </div>
        <div class="form-group">
          <label class="form-label">IP-Adresse</label>
          <input class="form-input" type="text" name="ip" value="{{ host.ip or '' }}">
        </div>
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
        <div class="form-group">
          <label class="form-label">Port</label>
          <input class="form-input" type="number" name="port" value="{{ host.port or 22 }}">
        </div>
        <div class="form-group">
          <label class="form-label">Tags</label>
          <input class="form-input" type="text" name="tags" value="{{ host.tags or '' }}">
        </div>
      </div>

      <div style="display:flex; align-items:center; gap:10px;">
        <input class="form-checkbox" type="checkbox" id="host-enabled-{{ host_id }}"
               name="enabled" value="true" {{ 'checked' if host.enabled }}>
        <label for="host-enabled-{{ host_id }}" style="font-size:13px; color:var(--text-2); cursor:pointer;">Aktiv</label>
      </div>

      <div style="display:flex; gap:10px; justify-content:flex-end; padding-top:14px; border-top:1px solid var(--border-s);">
        <button type="button" class="btn btn-ghost" x-on:click="$el.closest('.ds-modal-backdrop').remove()">Abbrechen</button>
        <button type="submit" class="btn btn-primary">Speichern</button>
      </div>
    </form>
  </div>
</div>
