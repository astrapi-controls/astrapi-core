<div class="ds-modal-backdrop"
     x-data x-on:keydown.escape.window="$el.remove()" x-on:click.self="$el.remove()">
  <div class="ds-modal">
    <div class="ds-modal-title">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
      </svg>
      Neuer Host
    </div>
    <form hx-post="/api/hosts/create"
          hx-target="#{{ container_id }}"
          hx-swap="innerHTML"
          hx-on::after-request="this.closest('.ds-modal-backdrop').remove()"
          style="display:flex; flex-direction:column; gap:14px;">

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
        <div class="form-group">
          <label class="form-label">Host-ID <span class="required-mark">*</span></label>
          <input class="form-input" type="text" name="host_id" required placeholder="z. B. web-03">
        </div>
        <div class="form-group">
          <label class="form-label">Beschreibung</label>
          <input class="form-input" type="text" name="description" placeholder="Web-Server 03">
        </div>
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
        <div class="form-group">
          <label class="form-label">IP-Adresse</label>
          <input class="form-input" type="text" name="ip" placeholder="192.168.1.30">
        </div>
        <div class="form-group">
          <label class="form-label">Port</label>
          <input class="form-input" type="number" name="port" value="22" placeholder="22">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Tags</label>
        <input class="form-input" type="text" name="tags" placeholder="web, production">
      </div>

      <div style="display:flex; align-items:center; gap:10px;">
        <input class="form-checkbox" type="checkbox" id="host-enabled-new" name="enabled" value="true" checked>
        <label for="host-enabled-new" style="font-size:13px; color:var(--text-2); cursor:pointer;">Aktiv</label>
      </div>

      <div style="display:flex; gap:10px; justify-content:flex-end; padding-top:14px; border-top:1px solid var(--border-s);">
        <button type="button" class="btn btn-ghost" x-on:click="$el.closest('.ds-modal-backdrop').remove()">Abbrechen</button>
        <button type="submit" class="btn btn-primary">Erstellen</button>
      </div>
    </form>
  </div>
</div>
