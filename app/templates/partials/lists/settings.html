<!-- partials/lists/settings.html -->
<!-- Beispielseite 2: Einstellungen mit Formularfeldern -->

<div class="page-header">
  <span class="page-title">Einstellungen</span>
  <button class="btn btn-primary btn-sm">Speichern</button>
</div>

<div class="ds-list-grid" style="grid-template-columns: 1fr;">

  <!-- Abschnitt: Allgemein -->
  <div class="ds-card on">
    <div class="card-header">
      <span class="card-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/>
        </svg>
        Allgemein
      </span>
    </div>
    <div class="card-inner">
      <div class="card-body" style="gap:14px;">

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
          <div class="form-group">
            <label class="form-label">Anwendungsname <span class="required-mark">*</span></label>
            <input class="form-input" type="text" value="myapp" placeholder="Name der Anwendung">
          </div>
          <div class="form-group">
            <label class="form-label">Sprache</label>
            <select class="form-select">
              <option value="de" selected>Deutsch</option>
              <option value="en">English</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">Beschreibung</label>
          <input class="form-input" type="text" placeholder="Kurze Beschreibung der Anwendung">
        </div>

      </div>
    </div>
  </div>

  <!-- Abschnitt: Benachrichtigungen -->
  <div class="ds-card on">
    <div class="card-header">
      <span class="card-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
          <path d="M13.73 21a2 2 0 01-3.46 0"/>
        </svg>
        Benachrichtigungen
      </span>
    </div>
    <div class="card-inner">
      <div class="card-body" style="gap:14px;">

        <div style="display:grid; grid-template-columns:1fr 1fr; gap:14px;">
          <div class="form-group">
            <label class="form-label">E-Mail</label>
            <input class="form-input" type="email" placeholder="admin@example.com">
          </div>
          <div class="form-group">
            <label class="form-label">Webhook URL</label>
            <input class="form-input" type="url" placeholder="https://hooks.example.com/…">
          </div>
        </div>

        <div style="display:flex; align-items:center; gap:10px; padding-top:4px;">
          <input class="form-checkbox" type="checkbox" id="notify-errors" checked>
          <label for="notify-errors" style="font-size:13px; color:var(--text-2); cursor:pointer;">
            Bei Fehlern benachrichtigen
          </label>
        </div>

        <div style="display:flex; align-items:center; gap:10px;">
          <input class="form-checkbox" type="checkbox" id="notify-success">
          <label for="notify-success" style="font-size:13px; color:var(--text-2); cursor:pointer;">
            Bei Erfolg benachrichtigen
          </label>
        </div>

      </div>
    </div>
  </div>

</div>
