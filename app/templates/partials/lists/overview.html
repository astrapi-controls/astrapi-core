<!-- partials/lists/overview.html -->
<!-- Beispielseite 1: Übersicht mit Karten -->

<div class="page-header">
  <span class="page-title">Übersicht</span>
  <button class="btn btn-primary btn-sm">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    Neu
  </button>
</div>

<div class="ds-list-grid">

  <!-- Karte 1: aktiv -->
  <div class="ds-card on">
    <div class="card-header">
      <span class="card-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="12" cy="12" r="10"/><polyline points="9 12 11 14 15 10"/>
        </svg>
        Beispiel-Eintrag A
      </span>
      <button class="toggle-switch toggle-on"
              title="Aktiv">
        <span class="toggle-knob"></span>
      </button>
    </div>
    <div class="card-inner">
      <div class="card-body">
        <div class="card-meta">
          <div class="meta-grid">
            <span class="meta-label">Host</span>
            <span class="meta-value">server-01.example.com</span>
            <span class="meta-label">Typ</span>
            <span class="meta-value">Kategorie A</span>
            <span class="meta-label">Zuletzt</span>
            <span class="meta-value">heute 03:15</span>
          </div>
        </div>
      </div>
      <div class="card-actions">
        <!-- Aktion: Ausführen -->
        <button class="btn-icon btn-icon-run" title="Ausführen">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
        </button>
        <!-- Aktion: Bearbeiten -->
        <button class="btn-icon" title="Bearbeiten">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
        <!-- Aktion: Löschen -->
        <button class="btn-icon btn-icon-danger" title="Löschen">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
            <path d="M10 11v6m4-6v6"/>
            <path d="M9 6V4h6v2"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="card-footer">
      <span style="font-size:11px; color:var(--text-3); font-family:var(--font-mono);">ID: abc-001</span>
      <span style="font-size:11px; color:var(--g); font-family:var(--font-mono);">● OK</span>
    </div>
  </div>

  <!-- Karte 2: inaktiv -->
  <div class="ds-card off">
    <div class="card-header">
      <span class="card-title">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
          <circle cx="12" cy="12" r="10"/>
        </svg>
        Beispiel-Eintrag B
      </span>
      <button class="toggle-switch toggle-off"
              title="Inaktiv">
        <span class="toggle-knob"></span>
      </button>
    </div>
    <div class="card-inner">
      <div class="card-body">
        <div class="card-meta">
          <div class="meta-grid">
            <span class="meta-label">Host</span>
            <span class="meta-value">server-02.example.com</span>
            <span class="meta-label">Typ</span>
            <span class="meta-value">Kategorie B</span>
            <span class="meta-label">Zuletzt</span>
            <span class="meta-value">gestern 22:00</span>
          </div>
        </div>
      </div>
      <div class="card-actions">
        <button class="btn-icon btn-icon-run" title="Ausführen">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polygon points="5 3 19 12 5 21 5 3"/>
          </svg>
        </button>
        <button class="btn-icon" title="Bearbeiten">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/>
            <path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>
          </svg>
        </button>
        <button class="btn-icon btn-icon-danger" title="Löschen">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <polyline points="3 6 5 6 21 6"/>
            <path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>
            <path d="M10 11v6m4-6v6"/>
            <path d="M9 6V4h6v2"/>
          </svg>
        </button>
      </div>
    </div>
    <div class="card-footer">
      <span style="font-size:11px; color:var(--text-3); font-family:var(--font-mono);">ID: abc-002</span>
      <span style="font-size:11px; color:var(--text-3); font-family:var(--font-mono);">● Deaktiviert</span>
    </div>
  </div>

  <!-- Leerer Zustand (wird angezeigt wenn keine Einträge vorhanden) -->
  <!-- <div class="empty-state">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
      <rect x="3" y="3" width="18" height="18" rx="2"/>
      <line x1="9" y1="9" x2="15" y2="15"/><line x1="15" y1="9" x2="9" y2="15"/>
    </svg>
    <div class="empty-state-title">Keine Einträge vorhanden</div>
    <div class="empty-state-sub">Erstelle deinen ersten Eintrag mit dem „Neu"-Button.</div>
  </div> -->

</div>
