{# system/modals/update.html – Live-Log-Modal für laufende Updates #}
<div id="update-modal"
     class="ds-modal-backdrop"
     x-data
     x-on:keydown.escape.window="if ($el.querySelector('[data-running]') === null) $el.remove()">
  <div class="ds-modal" style="max-width:640px; padding:20px 24px;">

    <div class="ds-modal-title">Update</div>
    <button type="button" class="ds-modal-close"
            onclick="if (!this.disabled) this.closest('#update-modal').remove()"
            {% if status == 'running' %}disabled title="Bitte warten bis das Update abgeschlossen ist"{% endif %}>
      ✕
    </button>

    {% include "system/partials/update_log.html" %}

  </div>
</div>
